<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>ГОК "Томинский" {% block title %}{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: #2b2622;
    min-height: 100vh;
    color: #f5f5f5;
}

.topbar {
    background: #1f1b18;
    border-bottom: 2px solid #c19a6b;
    padding: 10px 20px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 15px;
}

.logo-area {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: inherit;
}

.logo {
    height: 50px;
    width: auto;
}

.logo-text {
    font-size: 20px;
    font-weight: 600;
    color: #e0c097;
}

.nav-links {
    display: flex;
    flex-wrap: wrap;
    gap: 25px;
    align-items: center;
}

.nav-links a {
    color: #e0c097;
    text-decoration: none;
    font-weight: 500;
    transition: 0.2s;
    white-space: nowrap;
}

.nav-links a:hover {
    color: #c19a6b;
}

.badge {
    background: #c19a6b;
    color: #1f1b18;
    padding: 5px 12px;
    border-radius: 4px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    display: inline-block;
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
    white-space: nowrap;
}

.badge:hover {
    background: #e0c097;
    transform: translateY(-1px);
}

.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 70px);
    padding: 20px;
}

.container {
    width: 1200px;
    max-width: 100%;
    padding: 30px 20px;
    background: rgba(40, 35, 30, 0.95);
    border-radius: 6px;
    text-align: center;
    box-shadow: 0 6px 16px rgba(0,0,0,0.4);
}

.content {
    text-align: left;
    color: #ddd;
    line-height: 1.6;
}

.content h2 {
    color: #e0c097;
    margin-bottom: 20px;
}

.content p {
    margin-bottom: 15px;
}

.content ul {
    margin-left: 20px;
    margin-bottom: 15px;
}

.btn-back {
    display: inline-block;
    margin-top: 30px;
    background: #c19a6b;
    color: #1f1b18;
    padding: 10px 20px;
    border-radius: 4px;
    text-decoration: none;
    font-weight: 600;
    transition: 0.2s;
}

.btn-back:hover {
    background: #e0c097;
    transform: translateY(-2px);
}

footer {
    text-align: center;
    margin-top: 40px;
    font-size: 12px;
    color: #aaa;
    padding: 10px;
}

/* АДАПТИВНОСТЬ: на экранах до 800px меню становится вертикальным и центрированным */
@media (max-width: 800px) {
    .topbar {
        flex-direction: column;
        align-items: stretch;
        text-align: center;
    }
    .logo-area {
        justify-content: center;
    }
    .nav-links {
        justify-content: center;
        gap: 15px;
        flex-wrap: wrap;
    }
    .nav-links a {
        white-space: normal;
        font-size: 14px;
        padding: 5px 0;
    }
    .badge {
        align-self: center;
    }
    .wrapper {
        padding: 10px;
    }
    .container {
        padding: 20px 15px;
    }
    h1 {
        font-size: 1.5rem;
    }
}

@media (max-width: 480px) {
    .nav-links a {
        font-size: 12px;
    }
    .logo-text {
        font-size: 16px;
    }
    .badge {
        font-size: 12px;
        padding: 4px 10px;
    }
}
</style>
{% block extra_css %}{% endblock %}
</head>
<body>
<div class="topbar">
    <a href="https://tomgok.ru/" target="_blank" rel="noopener noreferrer" class="logo-area">
        <img src="/static/gok.png" alt="Логотип" class="logo" onerror="this.style.display='none'">
        <span class="logo-text">ГОК "Томинский"</span>
    </a>

    <div class="nav-links">
        <a href="/">Главная</a>
        <a href="/instruction">Инструкция</a>
        <a href="/company">О компании</a>
        <a href="/author">Об авторе</a>
    </div>

    <a href="https://bigchallenges.ru/" target="_blank" rel="noopener noreferrer" class="badge">
        Большие вызовы
    </a>
</div>

<div class="wrapper">
<div class="container">
    {% block content %}{% endblock %}
</div>
</div>

<footer>
    &copy; 2026 Большие вызовы
</footer>
</body>
</html>
